<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Sightline · Customer Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#16140f;--mut:#6b6660;--line:#e7e2d8;--bg:#f4f1ea;--ac:#1f6f5c;--head:'Fraunces',Georgia,serif;--body:'Inter',system-ui,sans-serif;--num:"Helvetica Neue",Helvetica,Arial,sans-serif}
*{box-sizing:border-box;margin:0}body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
h1,h2,h3{font-variant-ligatures:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 clamp(18px,4vw,40px)}
.top{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--line)}
.lg{display:flex;gap:10px;align-items:center;font-family:var(--head);font-weight:600;font-size:1.2rem}.dot{width:11px;height:11px;border-radius:50%;background:var(--ac)}
.top a,.top button{color:var(--mut);text-decoration:none;font-size:.85rem;background:none;border:0;cursor:pointer}
.hd{padding:26px 0 6px}.hd h1{font-family:var(--head);font-weight:400;font-size:clamp(1.8rem,1.3rem+2vw,2.6rem);letter-spacing:-.02em}.hd p{color:var(--mut);margin-top:8px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}@media(max-width:680px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:15px}.kpi .n{font-family:var(--num);font-weight:800;font-size:1.8rem;letter-spacing:-.02em;line-height:1}.kpi .l{color:var(--mut);font-size:.8rem;margin-top:6px}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:20px 0 12px}
.search{flex:1;min-width:200px;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.fb{font-size:.84rem;font-weight:600;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;cursor:pointer}.fb.on{background:#11271f;color:#fff;border-color:#11271f}
.addbtn{background:var(--ac);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:.88rem}
.addform{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:14px;display:none;grid-template-columns:1fr 1fr;gap:10px}
.addform.show{display:grid}@media(max-width:680px){.addform.show{grid-template-columns:1fr}}
.addform input,.addform textarea,.addform select{padding:10px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;width:100%}
.addform textarea{grid-column:1/-1;resize:vertical;min-height:52px}
.addform .row2{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end;align-items:center}
.addform .save{background:var(--ac);color:#fff;border:0;border-radius:9px;padding:10px 18px;font-weight:700;cursor:pointer}
.addform .cancel{background:none;border:0;color:var(--mut);cursor:pointer;font:inherit}
.cust{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:10px;display:grid;grid-template-columns:1.4fr 1.2fr auto;gap:14px;align-items:start}
@media(max-width:680px){.cust{grid-template-columns:1fr}}
.cust .nm{font-weight:700}.cust .bz{color:var(--mut);font-size:.85rem}
.cust .meta{font-size:.86rem;line-height:1.7}.cust .meta a{color:var(--ac);text-decoration:none;font-weight:600}
.cust .notes{color:var(--mut);font-size:.85rem;margin-top:6px;line-height:1.5}
.cust .when{color:var(--mut);font-size:.76rem;margin-top:4px}
.cust .right{text-align:right;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.badge{font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:999px;cursor:pointer;border:1px solid}
.badge.lead{background:#fdf3e3;color:#9a6b00;border-color:#f3dca0}.badge.prospect{background:#eef2fb;color:#3a5bbf;border-color:#d4ddf5}
.badge.customer{background:#eaf7ef;color:#1f8d57;border-color:#cdeeda}.badge.archived{background:#efece7;color:#6b6660;border-color:#e0dbd0}
.mini{font-size:.78rem;font-weight:600;color:var(--ac);background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;text-decoration:none}
.mini.del{color:#b4453a}
.login{max-width:420px;margin:8vh auto;background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center}
.login .lk{width:46px;height:46px;border-radius:12px;background:var(--ac);color:#fff;display:grid;place-items:center;margin:0 auto 14px}
.login h2{font-family:var(--head);font-weight:600;font-size:1.4rem}.login p{color:var(--mut);margin:6px 0 16px;font-size:.92rem}
.login input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font:inherit;margin-bottom:10px}
.login button{width:100%;background:var(--ac);color:#fff;border:0;border-radius:10px;padding:12px;font-weight:700;cursor:pointer}
.empty{text-align:center;color:var(--mut);padding:50px 20px}
.foot{color:var(--mut);font-size:.78rem;padding:24px 0 50px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#161a1d;color:#fff;padding:10px 16px;border-radius:10px;font-size:.86rem;opacity:0;transition:.25s;pointer-events:none;z-index:50}.toast.show{opacity:1}
.tagbar{display:flex;flex-wrap:wrap;gap:7px;margin:-2px 0 14px;align-items:center}
.tagpill{font-size:.76rem;font-weight:600;color:var(--ac);background:#fff;border:1px solid #d6e5df;border-radius:999px;padding:5px 12px;cursor:pointer}
.tagpill.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tagclear{font-size:.76rem;color:var(--mut);background:none;border:0;cursor:pointer}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tagchip{font-size:.7rem;font-weight:600;color:var(--ac);background:#eef4f1;border:1px solid #d6e5df;border-radius:999px;padding:3px 4px 3px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.tagchip:hover{background:#e0ede8}
.tagchip i{font-style:normal;color:var(--mut);background:#fff;border-radius:50%;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;font-size:.72rem}
.tagchip i:hover{color:#b4453a}
.tagadd{font-size:.7rem;color:var(--mut);background:none;border:1px dashed var(--line);border-radius:999px;padding:3px 10px;cursor:pointer}
.tagadd:hover{border-color:var(--ac);color:var(--ac)}
</style></head>
<body>
<header class="wrap top"><div class="lg"><span class="dot"></span>Sightline · Customer Database</div><div><a href="/admin/">← Dashboard</a> <button id="out" style="display:none;margin-left:14px">Sign out</button></div></header>
<div class="wrap"><div id="app"><div class="empty">Loading…</div></div>
<div class="foot">Your contacts, leads &amp; clients — private, visible only to your signed-in account. New contacts captured by your website arrive here automatically.</div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPA_URL="https://vtqmtecoxljduqomtkbw.supabase.co";
const SUPA_KEY="sb_publishable_tOVldxTzrH4_9U0x-GZGHw_UFM57C2c";
const app=document.getElementById("app"), outBtn=document.getElementById("out");
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),1800);}
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString([], {month:"short",day:"numeric"})+" · "+d.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"});}
let sb, rows=[], filter="all", q="", adding=false, tagFilter=null;
const ORDER=["lead","prospect","customer","archived"];

(async function(){
  let createClient;
  try{ ({createClient}=await import("https://esm.sh/@supabase/supabase-js@2")); }
  catch(e){ app.innerHTML='<div class="empty">Couldn’t reach the server. Retry in a moment.</div>'; return; }
  sb=createClient(SUPA_URL,SUPA_KEY);
  const {data:{session}}=await sb.auth.getSession();
  if(!session) return login();
  outBtn.style.display="inline"; outBtn.onclick=async()=>{await sb.auth.signOut();location.reload();};
  load();
})();

function login(){
  app.innerHTML=`<div class="login"><div class="lk">🔒</div><h2>Sign in to your CRM</h2>
  <p>Your customer database is private. We’ll email you a one-time login link.</p>
  <form id="lf"><input type="email" id="le" placeholder="you@email.com" required><button>Email me a login link</button></form>
  <div id="ln" style="color:var(--mut);font-size:.84rem;margin-top:12px"></div></div>`;
  document.getElementById("lf").onsubmit=async e=>{e.preventDefault();const email=document.getElementById("le").value.trim();
    document.getElementById("ln").textContent="Sending…";
    const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href}});
    document.getElementById("ln").textContent=error?("Couldn't send: "+error.message):("Check "+email+" for your login link.");};
}

async function load(){
  const {data,error}=await sb.from("customers").select("*").order("created_at",{ascending:false});
  if(error){ app.innerHTML='<div class="empty">'+esc(error.message)+'</div>'; return; }
  rows=data||[]; render();
}
async function setStatus(id,st){ const {error}=await sb.from("customers").update({status:st}).eq("id",id);
  if(error){toast(error.message);return;} const r=rows.find(x=>x.id===id); if(r)r.status=st; render(); }
async function removeRow(id){ if(!confirm("Delete this contact permanently?"))return;
  const {error}=await sb.from("customers").delete().eq("id",id);
  if(error){toast(error.message);return;} rows=rows.filter(x=>x.id!==id); render(); toast("Deleted"); }
async function addContact(f){
  const tags=(f.tags.value||"").split(",").map(t=>t.trim()).filter(Boolean);
  const rec={name:f.name.value.trim(),email:f.email.value.trim()||null,phone:f.phone.value.trim()||null,
    company:f.company.value.trim()||null,status:f.status.value,tags:tags.length?tags:null,
    notes:f.notes.value.trim()||null,source:"manual"};
  if(!rec.name){toast("Name is required");return;}
  if(!rec.email&&!rec.phone){toast("Add an email or phone");return;}
  const {data,error}=await sb.from("customers").insert(rec).select();
  if(error){toast(error.message);return;}
  if(data&&data[0])rows.unshift(data[0]); adding=false; render(); toast("Contact added");
}
async function addTag(id){
  const r=rows.find(x=>x.id===id); if(!r)return;
  const t=(prompt("Add a tag (e.g. VIP, referral, follow-up):")||"").trim(); if(!t)return;
  const tags=[...(r.tags||[])]; if(tags.includes(t)){toast("Already tagged");return;}
  tags.push(t);
  const {error}=await sb.from("customers").update({tags}).eq("id",id);
  if(error){toast(error.message);return;} r.tags=tags; render();
}
async function removeTag(id,tag){
  const r=rows.find(x=>x.id===id); if(!r)return;
  const tags=(r.tags||[]).filter(t=>t!==tag);
  const {error}=await sb.from("customers").update({tags:tags.length?tags:null}).eq("id",id);
  if(error){toast(error.message);return;} r.tags=tags; if(tagFilter&&!rows.some(x=>(x.tags||[]).includes(tagFilter)))tagFilter=null; render();
}

function render(){
  const now=Date.now(); const recent=rows.filter(r=>now-Date.parse(r.created_at)<7*864e5).length;
  const by=s=>rows.filter(r=>r.status===s).length;
  const term=q.trim().toLowerCase();
  let shown=filter==="all"?rows:rows.filter(r=>r.status===filter);
  if(term)shown=shown.filter(r=>[r.name,r.email,r.phone,r.company,r.notes].some(v=>(v||"").toLowerCase().includes(term))||(r.tags||[]).some(t=>t.toLowerCase().includes(term)));
  if(tagFilter)shown=shown.filter(r=>(r.tags||[]).includes(tagFilter));
  const allTags=[...new Set(rows.flatMap(r=>r.tags||[]))].sort();
  app.innerHTML=`<section class="hd"><h1>Customer database</h1><p>Every lead, prospect and client in one place. Tap a status to move it along.</p></section>
  <div class="kpis">
    <div class="kpi"><div class="n">${rows.length}</div><div class="l">Total contacts</div></div>
    <div class="kpi"><div class="n">${recent}</div><div class="l">New · last 7 days</div></div>
    <div class="kpi"><div class="n">${by("customer")}</div><div class="l">Customers</div></div>
    <div class="kpi"><div class="n">${by("lead")+by("prospect")}</div><div class="l">Open leads</div></div>
  </div>
  <div class="bar">
    <input class="search" id="q" placeholder="Search name, email, company…" value="${esc(q)}">
    <div class="filters">${["all",...ORDER].map(f=>`<button class="fb ${filter===f?'on':''}" data-f="${f}">${f[0].toUpperCase()+f.slice(1)}${f!=="all"?" "+by(f):" "+rows.length}</button>`).join("")}</div>
    <button class="addbtn" id="addToggle">${adding?"Close":"+ Add contact"}</button>
  </div>
  ${allTags.length?`<div class="tagbar">${allTags.map(t=>`<button class="tagpill ${tagFilter===t?'on':''}" data-tf="${esc(t)}">${esc(t)}</button>`).join("")}${tagFilter?`<button class="tagclear" id="tagClear">Clear tag ✕</button>`:""}</div>`:""}
  <form class="addform ${adding?'show':''}" id="addform" autocomplete="off">
    <input name="name" placeholder="Full name *" required>
    <input name="company" placeholder="Company">
    <input name="email" type="email" placeholder="Email">
    <input name="phone" placeholder="Phone">
    <input name="tags" placeholder="Tags — comma separated (e.g. VIP, referral)">
    <select name="status">${ORDER.map(s=>`<option value="${s}">${s[0].toUpperCase()+s.slice(1)}</option>`).join("")}</select>
    <textarea name="notes" placeholder="Notes (optional)"></textarea>
    <div class="row2"><button type="button" class="cancel" id="addCancel">Cancel</button><button type="submit" class="save">Save contact</button></div>
  </form>
  ${shown.length?shown.map(r=>`<div class="cust">
    <div><div class="nm">${esc(r.name||"(no name)")}</div>${r.company?`<div class="bz">${esc(r.company)}</div>`:""}
      <div class="when">Added ${fmt(r.created_at)}</div>
      ${r.notes?`<div class="notes">${esc(r.notes)}</div>`:""}
      <div class="tags">${(r.tags||[]).map(t=>`<span class="tagchip" data-tag="${esc(t)}">${esc(t)} <i data-rmtag="${esc(t)}" data-id="${r.id}">×</i></span>`).join("")}<button class="tagadd" data-addtag="${r.id}">+ tag</button></div></div>
    <div class="meta">${r.email?`✉ <a href="mailto:${esc(r.email)}">${esc(r.email)}</a><br>`:""}${r.phone?`☎ <a href="tel:${esc(r.phone)}">${esc(r.phone)}</a>`:""}</div>
    <div class="right"><span class="badge ${r.status}" data-id="${r.id}">${r.status}</span>
      <button class="mini del" data-del="${r.id}">Delete</button></div>
  </div>`).join(""):`<div class="empty">${rows.length?"No contacts match.":"No contacts yet. They’ll appear here as your website captures them — or add one manually."}</div>`}`;
  const qi=document.getElementById("q"); if(qi){qi.oninput=()=>{q=qi.value;const p=qi.selectionStart;render();const n=document.getElementById("q");n.focus();try{n.setSelectionRange(p,p);}catch(e){}};}
  document.querySelectorAll(".fb").forEach(b=>b.onclick=()=>{filter=b.dataset.f;render();});
  document.getElementById("addToggle").onclick=()=>{adding=!adding;render();};
  const ac=document.getElementById("addCancel"); if(ac)ac.onclick=()=>{adding=false;render();};
  const af=document.getElementById("addform"); if(af)af.onsubmit=e=>{e.preventDefault();addContact(e.target);};
  document.querySelectorAll(".badge").forEach(b=>b.onclick=()=>{const r=rows.find(x=>x.id===b.dataset.id);if(!r)return;setStatus(r.id,ORDER[(ORDER.indexOf(r.status)+1)%ORDER.length]);});
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>removeRow(b.dataset.del));
  document.querySelectorAll(".tagpill").forEach(b=>b.onclick=()=>{tagFilter=tagFilter===b.dataset.tf?null:b.dataset.tf;render();});
  const tclr=document.getElementById("tagClear"); if(tclr)tclr.onclick=()=>{tagFilter=null;render();};
  document.querySelectorAll(".tagchip").forEach(b=>b.onclick=e=>{if(e.target.dataset.rmtag)return;tagFilter=b.dataset.tag;render();});
  document.querySelectorAll("[data-rmtag]").forEach(b=>b.onclick=e=>{e.stopPropagation();removeTag(b.dataset.id,b.dataset.rmtag);});
  document.querySelectorAll("[data-addtag]").forEach(b=>b.onclick=()=>addTag(b.dataset.addtag));
}
</script>
</body></html>
